{% extends 'main/base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto px-6 py-12">
    <div class="glass-card p-10 rounded-3xl border border-white/10">
        <h2 class="text-3xl font-800 brand-font mb-8">Create New <span class="text-indigo-500">Package</span></h2>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% for field in form %}
                <div class="flex flex-col gap-2 {% if field.name == 'free_accessories' %}md:col-span-2{% endif %}">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.help_text %}
                    <span class="text-[10px] text-gray-600 italic">{{ field.help_text }}</span>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="pt-8 flex items-center gap-6">
                <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white font-black uppercase tracking-widest rounded-xl hover:bg-indigo-700 transition">
                    Save Package
                </button>
                <a href="{% url 'package_list' %}" class="px-8 py-4 text-gray-500 font-bold uppercase tracking-widest hover:text-white transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Styling the Django generated inputs to match Tailwind */
    input, textarea, select {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        padding: 0.75rem 1rem !important;
        border-radius: 0.75rem !important;
    }
    input:focus { border-color: #4F46E5 !important; outline: none; }
</style>
{% endblock %}
