<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoSewa | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #050505; color: white; overflow: hidden; }
        h1, h2, .brand-font { font-family: 'Montserrat', sans-serif; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .form-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: #4F46E5;
            outline: none;
            background: rgba(255, 255, 255, 0.07);
        }

        .back-nav-white {
            transition: all 0.3s ease;
            color: white;
        }
        .back-nav-white:hover {
            opacity: 0.7;
            transform: translateX(-4px);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 z-0">
        <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-indigo-900/10 blur-[100px] rounded-full"></div>
    </div>

    <a href="{%url 'home_page'%}" class="fixed top-8 left-8 z-50 flex items-center space-x-3 back-nav-white group">
        <i class="fa fa-arrow-left text-xl"></i>
        <span class="text-[10px] font-800 uppercase tracking-[0.3em]">Back</span>
    </a>

    <main class="relative z-10 w-full max-w-4xl grid lg:grid-cols-2 gap-0 overflow-hidden rounded-[2.5rem] glass-panel shadow-2xl">
        
        <div class="hidden lg:flex p-12 flex-col justify-between bg-black/40 border-r border-white/5">
            <div>
                <span class="text-xl font-800 tracking-tighter text-indigo-500 brand-font italic uppercase">Photo<span class="text-white">Sewa</span></span>
                <h1 class="mt-12 text-5xl font-800 leading-none uppercase tracking-tighter">
                    Unlock <br><span class="text-indigo-500">Vision.</span>
                </h1>
                <p class="mt-6 text-gray-400 text-sm font-light leading-relaxed max-w-xs">
                    Log in to Nepal's premier photography marketplace.
                </p>
            </div>

            <div class="text-[9px] font-800 uppercase tracking-[0.4em] text-gray-700">
                Visual Identity v2.0
            </div>
        </div>

        <div class="p-10 md:p-14 bg-white/5 flex items-center">
            <div class="max-w-xs mx-auto lg:max-w-none w-full">
                <div class="mb-10">
                    <h2 class="text-3xl font-800 uppercase tracking-tight">Sign In</h2>
                    <p class="text-gray-500 text-[11px] font-medium tracking-wide mt-2">Authorized Access Only.</p>
                </div>

                <form action="#" class="space-y-6">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-[9px] font-800 uppercase tracking-widest text-indigo-500 mb-2 ml-1">Email</label>
                            <input type="email" placeholder="name@domain.com" class="w-full px-5 py-4 rounded-2xl form-input text-sm text-white">
                        </div>
                        
                        <div>
                            <label class="block text-[9px] font-800 uppercase tracking-widest text-indigo-500 mb-2 ml-1">Password</label>
                            <input type="password" placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl form-input text-sm text-white">
                        </div>
                    </div>

                    <div class="pt-4 text-center">
                        <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-800 uppercase tracking-widest text-[11px] rounded-2xl transition-all shadow-xl shadow-indigo-600/20 active:scale-[0.98]">
                            Login
                        </button>
                        
                        <a href="#" class="inline-block mt-6 text-[10px] font-800 uppercase text-gray-500 hover:text-indigo-500 transition-colors tracking-[0.2em]">
                            Forgot Password?
                        </a>
                    </div>

                    <div class="pt-6 border-t border-white/5 text-center">
                        <p class="text-[11px] text-gray-500 font-medium">
                            New here? <a href="{%url 'registration_page'%}" class="text-indigo-500 font-800 uppercase tracking-widest hover:underline ml-1">Register</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
